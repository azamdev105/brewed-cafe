<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brewed — Where Every Cup Tells a Story</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>

<body>
    <div class="sidebar">
        <i id="close" class="ri-close-large-fill"></i>
        <a href="#home">Home</a>
        <a href="#menu">Menu</a>
        <a href="#about">About</a>
        <a href="#gallery">Gallery</a>
        <a href="#contact">Contact</a>
        <a href="#" class="btn btn--primary">Reserve a Table</a>
    </div>
    <header class="header">
        <div class="container">
            <nav class="nav">
                <div class="nav__logo">
                    <a href="#home">Brewed.</a>
                </div>
                <div class="nav__links">
                    <a class="hideOnMobile" href="#home">Home</a>
                    <a class="hideOnMobile" href="#menu">Menu</a>
                    <a class="hideOnMobile" href="#about">About</a>
                    <a class="hideOnMobile" href="#gallery">Gallery</a>
                    <a class="hideOnMobile" href="#contact">Contact</a>
                </div>
                <div class="nav__cta">
                    <a class="hideOnMobile btn btn--primary" href="#">Reserve a Table</a>
                    <i id="menu" class="ri-menu-line"></i>
                </div>
            </nav>
        </div>
    </header>
    <main>
        <section class="hero-section" id="home">
            <div class="container">
                <div class="hero">
                    <div class="hero__content animate">
                        <span class="hero__label">Est. 2018 — Kuala Lumpur</span>
                        <h1 class="hero__heading">Where Every Cup<br><span class="text-brand">Tells a Story.</span></h1>
                        <p class="hero__subtext">Handcrafted coffee, warm spaces, and a menu made with care. Come as you
                            are — stay as long as you like.</p>
                        <div class="hero__cta">
                            <a href="#menu" class="btn btn--primary">Explore the Menu</a>
                            <a href="#contact" class="btn btn--outline">Find Us</a>
                        </div>
                    </div>
                    <div class="hero__image animate animate-delay-2">
                        <img src="https://placehold.co/600x700" alt="Brewed Café">
                    </div>
                </div>
            </div>
        </section>
        <section class="about-section" id="about"></section>
        <section class="menu-section" id="menu"></section>
        <section class="experience-section"></section>
        <section class="gallery-section" id="gallery"></section>
        <section class="testimonials-section"></section>
        <section class="contact-section" id="contact"></section>
    </main>
    <footer class="footer"></footer>
</body>

</html>
